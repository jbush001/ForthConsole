<!DOCTYPE html>
<html>
    <head>
        <script type="module" src="main.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="tabbar">
            <button id="tab0" class="tablink">Output</button>
            <button id="tab1" class="tablink">Source</button>
            <button id="tab2" class="tablink">Sprites</button>
            <button id="tab3" class="tablink">Sound Effects</button>
        </div>

        <div id="outputtab" class="tabcontent">
            <div>
                <canvas id="screen" width="192" height="128"></canvas>
                <div id="instructions">
                    <b>Controls</b><br>
                    Arrow Keys: Up/down/right/left<br>
                    Z: button 0<br>
                    X: button 1<br>
                    Escape: pause/resume
                </div>
            </div>
            <br/>
            <label for="fileSelect">Load File:</label>
            <select id="fileSelect">
            </select>

            <button id="reset_button">Reset</button>
            <button id="play_pause_button">Pause</button>
            <button id="save">Save</button>
            <button id="newprogram">New</button>

            <div>Console output:</div>
            <div id="output"></div>
            <input type="text" id="input" spellcheck="false"></div>
        </div>

        <div id="sourcetab" class="tabcontent">
            <div id="source" contenteditable="true" spellcheck="false">
                <div></div>
            </div>
        </div>

        <div id="spritestab" class="tabcontent">
            <canvas id="sprite_edit" width="800" height="600"></canvas>
        </div>

        <div id="soundstab" class="tabcontent">
            <div style="margin: 5px">
                <button id="prevfx">Prev</button>
                <button id="playfx">Play</button>
                <button id="nextfx">Next</button>
                <span id="curfx"></span>
            </div>
            <label for="sfxduration" style="margin: 5px">Duration:</label>
            <input type="text" id="sfxduration" name="sfxduration" style="margin: 5px">

            <label for="waveform">Waveform:</label>
            <select id="waveform" name="waveform">
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
                <option value="sawtooth">Sawtooth</option>
            </select>
        </div>
    </body>
</html>
